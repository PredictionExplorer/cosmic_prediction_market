[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# GenerateVectors.s.sol writes the frontend's differential test fixtures.
fs_permissions = [{ access = "read-write", path = "frontend/src/test/fixtures" }]

# Production compiler settings. Kept in the DEFAULT profile on purpose: tests,
# CI and deployments must all exercise the exact bytecode that ships.
solc = "0.8.35"             # pinned for reproducible, verifiable builds
optimizer = true
optimizer_runs = 1_000_000  # deploy-once singleton, far under the size limit: favor runtime gas
via_ir = true               # Yul IR pipeline: whole-contract optimization
evm_version = "osaka"       # supported on Arbitrum One since ArbOS 51 "Dia" (Jan 2026)

# Everyday runs: quick but meaningful fuzzing.
[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 64
depth = 64
# Handler calls are fully bounded; ANY revert is a bug and must fail the run.
fail_on_revert = true

# Long-running campaign: FOUNDRY_PROFILE=heavy forge test
# Crank `runs` further for overnight fuzzing sessions.
[profile.heavy.fuzz]
runs = 50000
max_test_rejects = 1000000

[profile.heavy.invariant]
runs = 512
depth = 256
fail_on_revert = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
